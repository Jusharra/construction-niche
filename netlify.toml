[build]
  publish = "."
  # No build command — pure static HTML/CSS/JS site

[functions]
  node_bundler = "esbuild"

[context.production.environment]
  NODE_VERSION = "18"

# ──────────────────────────────────────────────────────────────────────────────
# REQUIRED ENVIRONMENT VARIABLES
# Set these in: Netlify Dashboard → Site → Environment variables
#
# ── SendGrid (email notifications on each form submission) ──────────────────
#   SENDGRID_API_KEY           = SG.xxxx...          (your SendGrid API key)
#   SENDGRID_FROM_EMAIL        = noreply@walldoctortx.com  (must be a Verified Sender in SendGrid)
#   OWNER_NOTIFICATION_EMAIL   = valleywalldoctor@yahoo.com  (admin receives new lead notification)
#
# ── Twilio (outbound SMS on each form submission) ───────────────────────────
#   NOTE: VAPI manages the Twilio number (817) 670-9771 directly.
#         Inbound calls and SMS are handled by VAPI — no Twilio webhook setup needed.
#         These vars are only needed for outbound SMS lead alerts to the owner.
#   TWILIO_ACCOUNT_SID         = ACxxxx...           (Twilio Account SID)
#   TWILIO_AUTH_TOKEN          = xxxx...             (Twilio Auth Token)
#   TWILIO_FROM_NUMBER         = +18176709771        (your Twilio number, E.164 format)
#   OWNER_NOTIFICATION_PHONE   = +1XXXXXXXXXX        (your personal cell — receives SMS on new leads)
#
# ── Airtable (CRM webhook — optional) ──────────────────────────────────────
#   AIRTABLE_WEBHOOK_URL       = https://hooks.airtable.com/...
#
# ── SMS auto-reply override (optional) ─────────────────────────────────────
#   SMS_AUTO_REPLY             = "Custom reply text for inbound SMS"
#
# ── VAPI (AI chat widget + phone number) ────────────────────────────────────
#   VAPI_PUBLIC_KEY            = your VAPI public API key  (app.vapi.ai → Account → API Keys)
#   VAPI_ASSISTANT_ID          = assistant ID              (app.vapi.ai → Assistants)
#   VAPI_PRIVATE_KEY           = your VAPI private/server API key
#                                Found at: app.vapi.ai → Account → API Keys → Private key
#                                Used server-side to proxy chat messages securely.
#   NOTE: Once all three VAPI vars are set and deployed, the floating "Chat with AI"
#         button appears automatically on every page — no HTML changes needed.
# ──────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
